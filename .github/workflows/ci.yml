name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Validate skill
        run: npm run validate:skill

      - name: Build package
        run: npm run build

      - name: Build release artifacts
        run: npm run package:release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nucleo-ai-artifacts
          path: |
            artifacts/*.tgz
            artifacts/*.zip
